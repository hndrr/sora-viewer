<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Sora Viewer</title>
  <desc id="desc">Sora export ZIP viewer for local browser playback.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1200" y1="0" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#19191c"/>
      <stop offset="0.5" stop-color="#0d0e12"/>
      <stop offset="1" stop-color="#050507"/>
    </linearGradient>
    <linearGradient id="card" x1="192" x2="1010" y1="96" y2="546" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1c2230"/>
      <stop offset="1" stop-color="#090b10"/>
    </linearGradient>
    <linearGradient id="accent" x1="260" x2="920" y1="110" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7db3ff"/>
      <stop offset="0.48" stop-color="#d8e0ff"/>
      <stop offset="1" stop-color="#6ee7b7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="36" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.45">
    <rect x="90" y="82" width="130" height="188" rx="18" fill="#202532"/>
    <rect x="978" y="370" width="132" height="188" rx="18" fill="#1a2a25"/>
    <rect x="1020" y="116" width="88" height="126" rx="16" fill="#202532"/>
  </g>
  <rect x="170" y="92" width="860" height="446" rx="34" fill="url(#card)" filter="url(#shadow)"/>
  <path fill="none" stroke="url(#accent)" stroke-linecap="round" stroke-linejoin="round" stroke-width="14" d="M250 156h292c30.93 0 56 25.07 56 56v212c0 30.93-25.07 56-56 56H250c-30.93 0-56-25.07-56-56V212c0-30.93 25.07-56 56-56Z" filter="url(#glow)"/>
  <path fill="#20242f" d="M194 218h404v54H194zM194 368h404v54H194z"/>
  <path fill="url(#accent)" d="M372 263c0-13.85 15.12-22.4 26.99-15.25l106.42 64.13c11.51 6.94 11.51 23.64 0 30.58L398.99 406.6C387.12 413.75 372 405.2 372 391.35V263Z"/>
  <g fill="#dbe8ff" opacity="0.8">
    <circle cx="254" cy="202" r="10"/>
    <circle cx="536" cy="202" r="10"/>
    <circle cx="254" cy="434" r="10"/>
    <circle cx="536" cy="434" r="10"/>
  </g>
  <text x="650" y="252" fill="#f5f7fb" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="76" font-weight="800" letter-spacing="0">Sora Viewer</text>
  <text x="654" y="318" fill="#b5c2d8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="500" letter-spacing="0">ZIP を選ぶだけで、Sora エクスポートを</text>
  <text x="654" y="360" fill="#b5c2d8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="500" letter-spacing="0">ブラウザ内で検索・再生</text>
  <rect x="654" y="406" width="254" height="44" rx="22" fill="#17241f" stroke="#2f6656"/>
  <text x="684" y="435" fill="#99f6d6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700" letter-spacing="0">No upload required</text>
</svg>
